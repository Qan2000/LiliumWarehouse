<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nhập kho - Lilium Warehouse</title>
</head>

<body>

<h2>📥 Nhập kho (Realtime)</h2>

<input id="inputSearch" placeholder="Mã hàng / Tên SP">
<input id="soluong" type="number" placeholder="Số lượng">

<button onclick="nhapKho()">Nhập kho</button>
<button onclick="nhapNhanh()">Nhập nhanh</button>

<h3>Lịch sử</h3>
<ul id="lichsu"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 THAY CONFIG CỦA BẠN
const firebaseConfig = {
  apiKey: "AIzaSyBHjg-9gjIStVv7QzYJXt9EkxwZO3KgJ3g",
  authDomain: "lilium-kho.firebaseapp.com",
  projectId: "lilium-kho"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= NHẬP KHO =================
window.nhapKho = async function () {
  const name = document.getElementById("inputSearch").value.trim();
  const qty = Number(document.getElementById("soluong").value);

  if (!name || qty <= 0) {
    alert("Nhập thiếu dữ liệu!");
    return;
  }

  await addDoc(collection(db, "transactions"), {
    mahang: name.toUpperCase(),
    ten: name,
    soluong: qty,
    type: "import",
    createdAt: new Date()
  });

  document.getElementById("inputSearch").value = "";
  document.getElementById("soluong").value = "";
};

// ================= NHẬP NHANH =================
window.nhapNhanh = async function () {
  const name = document.getElementById("inputSearch").value.trim();
  const qty = Number(document.getElementById("soluong").value);

  if (!name || qty <= 0) return;

  await addDoc(collection(db, "transactions"), {
    mahang: name.toUpperCase(),
    ten: name,
    soluong: qty,
    type: "import",
    createdAt: new Date()
  });
};

// ================= REALTIME =================
const list = document.getElementById("lichsu");

onSnapshot(collection(db, "transactions"), (snapshot) => {
  list.innerHTML = "";

  let dataArr = [];

  snapshot.forEach(doc => {
    const data = doc.data();
    if (data.type === "import") {
      dataArr.push(data);
    }
  });

  dataArr.reverse();

  dataArr.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.mahang} - +${item.soluong}`;
    list.appendChild(li);
  });
});
</script>

</body>
</html>
