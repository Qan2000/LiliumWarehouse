<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tồn kho - Lilium Warehouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background: #f8f9f6;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1A472A, #2E6B3F);
            color: white;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            font-size: 21px;
            text-align: center;
            margin-bottom: 30px;
            color: #f0f4f1;
            letter-spacing: 1.5px;
        }
        .sidebar a {
            display: block;
            padding: 14px 18px;
            margin: 6px 0;
            color: #e0f0e4;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #4a9c6a;
            color: white;
            transform: translateX(8px);
            font-weight: 600;
        }

        .admin-only { display: none; }

        .content {
            flex: 1;
            padding: 60px 20px;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 40px 35px;
            border-radius: 24px;
            width: 1120px;
            max-width: 100%;
            box-shadow: 0 20px 50px rgba(26, 71, 42, 0.15);
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .back-link:hover { color: #1A472A; }

        h2.card-title {
            text-align: center;
            color: #1A472A;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .form-container, .search-box {
            opacity: 1; /* Form và search box luôn hiện ngay */
        }

        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            background: #f4f9f6;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #e0f0e4;
        }
        input {
            padding: 14px 16px;
            border: 1px solid #d1e0d7;
            border-radius: 12px;
            font-size: 15px;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #1A472A;
            box-shadow: 0 0 0 4px rgba(26, 71, 42, 0.15);
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
        }
        .add { background: linear-gradient(135deg, #1A472A, #2E6B3F); color: white; }
        .add:hover { background: linear-gradient(135deg, #2E6B3F, #1A472A); transform: translateY(-2px); }
        .reset { background: #64748b; color: white; }
        .export-excel { background: linear-gradient(135deg, #1A472A, #2E6B3F); color: white; }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .search-box input {
            width: 420px;
            padding: 14px 16px;
            border: 1px solid #d1e0d7;
            border-radius: 12px;
        }

        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(26, 71, 42, 0.1);
        }
        th, td { 
            padding: 16px 12px; 
            text-align: center;
            font-size: 15.2px;
            line-height: 1.5;
        }
        th {
            background: linear-gradient(135deg, #1A472A, #2E6B3F);
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 15.5px;
        }
        th:hover { background: #3a8a5a; }

        tr:nth-child(even) { background: #f8fbf9; }
        tr:hover { background: #f0f9f4; }

        /* Nút Sửa & Xóa đẹp */
        .action-btn {
            padding: 8px 14px;
            margin: 0 4px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .edit-btn  { background: #2E6B3F; color: white; }
        .edit-btn:hover  { background: #1A472A; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(26,71,42,0.3); }
        .delete-btn { background: #ef4444; color: white; }
        .delete-btn:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(239,68,68,0.4); }

        /* ================== HIỆU ỨNG ẢO DIỆU KHI CUỘN ================== */
        .row-reveal {
            opacity: 0;
            transform: translateY(45px) scale(0.98);
            transition: all 900ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .row-reveal.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>LILIUM WAREHOUSE</h2>
    <a href="nhapkho.html" class="admin-only">📥 Nhập kho</a>
    <a href="xuatkho.html" class="admin-only">📤 Xuất kho</a>
    <a href="tonkho.html" class="active">📊 Tồn kho</a>
</div>

<div class="content">
    <div class="card" id="mainCard">
        <a href="index.html" class="back-link">⬅ Quay lại Trang chủ</a>
        <h2 class="card-title">📊 Quản lý tồn kho - Mỹ phẩm</h2>

        <form class="form-container" onsubmit="themSanPham(); return false;">
            <input type="text" id="mahang" placeholder="Mã hàng *" maxlength="20" required>
            <input type="text" id="ten" placeholder="Tên sản phẩm *" required>
            <input type="text" id="nsx" placeholder="Nơi sản xuất">
            <input type="text" id="ncc" placeholder="Nhà cung cấp">
            <input type="text" id="qc" placeholder="Quy cách (ví dụ: 500g, 1.5kg, 250ml)" style="min-width: 220px;">
            <input type="number" id="soluong" placeholder="Số lượng *" min="0" step="0.001" required>
            <input type="number" id="shelflife" placeholder="Shelf Life (tháng)" min="1">
            <input type="date" id="manufacture" placeholder="Ngày sản xuất">
            <input type="date" id="retest" placeholder="Retest Date">

            <button class="add" type="submit">➕ Lưu sản phẩm</button>
            <button class="reset" type="button" onclick="resetForm()">🔄 Làm mới</button>
        </form>

        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Tìm kiếm mã hàng, tên sản phẩm...">
            <button class="export-excel" onclick="xuatExcel()">📊 Xuất Excel</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th onclick="sortTable(1)">Mã hàng</th>
                        <th onclick="sortTable(2)">Tên sản phẩm</th>
                        <th onclick="sortTable(3)">Nhà cung cấp / Nơi SX</th>
                        <th>Quy cách</th>
                        <th onclick="sortTable(5)">Số lượng</th>
                        <th>Shelf Life</th>
                        <th>Manufacture Date</th>
                        <th>Retest Date</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="bang"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>

let danhSach = JSON.parse(localStorage.getItem("mypham")) || [];
let editIndex = -1;
let sortDirection = {};

function checkAdmin() {
    const isAdmin = sessionStorage.getItem("isLoggedIn") === "true";
    document.querySelectorAll('.admin-only').forEach(link => link.style.display = isAdmin ? "block" : "none");
}

function luuLocal() {
    localStorage.setItem("mypham", JSON.stringify(danhSach));
}

function hienThi(filter = "") {
    const bang = document.getElementById("bang");
    bang.innerHTML = "";

    let filteredList = danhSach.filter(sp => {
        const text = (sp.mahang + " " + sp.ten + " " + (sp.nsx || "") + " " + (sp.ncc || "")).toLowerCase();
        return text.includes(filter.toLowerCase());
    });

    const sortedCol = Object.keys(sortDirection)[0];
    if (sortedCol) {
        const colIndex = parseInt(sortedCol);
        const dir = sortDirection[sortedCol];
        filteredList.sort((a, b) => {
            let valA = Object.values(a)[colIndex] || "";
            let valB = Object.values(b)[colIndex] || "";
            if (!isNaN(valA) && !isNaN(valB)) return dir * (parseFloat(valA) - parseFloat(valB));
            return dir * String(valA).localeCompare(String(valB));
        });
    }

    filteredList.forEach((sp) => {
        const idx = danhSach.findIndex(item => item === sp);
        let nccNsx = sp.ncc && sp.nsx ? `${sp.ncc} - ${sp.nsx}` : (sp.ncc || sp.nsx || '-');

        bang.innerHTML += `
            <tr class="row-reveal">
                <td>${idx + 1}</td>
                <td><strong>${sp.mahang}</strong></td>
                <td><strong>${sp.ten}</strong></td>
                <td>${nccNsx}</td>
                <td>${sp.qc || '-'}</td>
                <td><strong>${parseFloat(sp.soluong).toFixed(3).replace(/\.?0+$/, '')}</strong></td>
                <td>${sp.shelflife ? sp.shelflife + ' tháng' : '-'}</td>
                <td>${sp.manufacture || '-'}</td>
                <td>${sp.retest || '-'}</td>
                <td>
                    <button onclick="suaSanPham(${idx})" class="action-btn edit-btn">✏️ Sửa</button>
                    <button onclick="xoaSanPham(${idx})" class="action-btn delete-btn">🗑️ Xóa</button>
                </td>
            </tr>`;
    });

    // Kích hoạt hiệu ứng ảo diệu khi cuộn
    triggerRowReveal();
}

function triggerRowReveal() {
    const rows = document.querySelectorAll('#bang tr.row-reveal');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                setTimeout(() => {
                    entry.target.classList.add('visible');
                }, index * 80); // stagger tạo cảm giác ảo diệu
            }
        });
    }, {
        threshold: 0.15,
        rootMargin: "0px 0px -50px 0px"
    });

    rows.forEach(row => observer.observe(row));
}

function themSanPham() {
    const mahang = document.getElementById("mahang").value.trim().toUpperCase();
    const ten = document.getElementById("ten").value.trim();
    const nsx = document.getElementById("nsx").value.trim();
    const ncc = document.getElementById("ncc").value.trim();
    const qc = document.getElementById("qc").value.trim();
    const soluong = parseFloat(document.getElementById("soluong").value);

    if (!mahang || !ten || isNaN(soluong)) {
        showToast("Vui lòng nhập đầy đủ Mã hàng, Tên sản phẩm và Số lượng!", "#ef4444");
        return;
    }

    const sanpham = {
        mahang, ten, nsx, ncc, qc, soluong,
        shelflife: document.getElementById("shelflife").value.trim() || null,
        manufacture: document.getElementById("manufacture").value || null,
        retest: document.getElementById("retest").value || null
    };

    if (editIndex >= 0) {
        danhSach[editIndex] = sanpham;
        showToast("✅ Đã cập nhật sản phẩm thành công!");
        editIndex = -1;
    } else {
        danhSach.push(sanpham);
        showToast("✅ Đã thêm sản phẩm vào kho!");
    }

    luuLocal();
    hienThi(document.getElementById("search").value);
    resetForm();
}

function xoaSanPham(index) {
    if (confirm("Bạn có chắc muốn xóa sản phẩm này?")) {
        danhSach.splice(index, 1);
        luuLocal();
        hienThi(document.getElementById("search").value);
        showToast("🗑️ Đã xóa sản phẩm!");
    }
}

function suaSanPham(index) {
    editIndex = index;
    const sp = danhSach[index];
    document.getElementById("mahang").value = sp.mahang;
    document.getElementById("ten").value = sp.ten;
    document.getElementById("nsx").value = sp.nsx || "";
    document.getElementById("ncc").value = sp.ncc || "";
    document.getElementById("qc").value = sp.qc || "";
    document.getElementById("soluong").value = sp.soluong;
    document.getElementById("shelflife").value = sp.shelflife || "";
    document.getElementById("manufacture").value = sp.manufacture || "";
    document.getElementById("retest").value = sp.retest || "";

    showToast("✏️ Đang chỉnh sửa sản phẩm...", "#3b82f6");
}

function resetForm() {
    document.getElementById("mahang").value = "";
    document.getElementById("ten").value = "";
    document.getElementById("nsx").value = "";
    document.getElementById("ncc").value = "";
    document.getElementById("qc").value = "";
    document.getElementById("soluong").value = "";
    document.getElementById("shelflife").value = "";
    document.getElementById("manufacture").value = "";
    document.getElementById("retest").value = "";
    editIndex = -1;
}

function timKiemRealTime() {
    hienThi(document.getElementById("search").value);
}

function xuatExcel() {
    if (danhSach.length === 0) {
        showToast("Không có dữ liệu để xuất!", "#ef4444");
        return;
    }
    const wb = XLSX.utils.book_new();
    const wsData = danhSach.map((sp, i) => ({
        "STT": i + 1,
        "Mã hàng": sp.mahang,
        "Tên sản phẩm": sp.ten,
        "Nhà cung cấp": sp.ncc || "",
        "Nơi sản xuất": sp.nsx || "",
        "Quy cách": sp.qc || "",
        "Số lượng": sp.soluong,
        "Shelf Life (tháng)": sp.shelflife || "",
        "Manufacture Date": sp.manufacture || "",
        "Retest Date": sp.retest || ""
    }));
    const ws = XLSX.utils.json_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, "Tồn kho Mỹ phẩm");
    XLSX.writeFile(wb, `TonKho_MyPham_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast("📊 Đã xuất file Excel!");
}

function sortTable(col) {
    const key = col.toString();
    sortDirection = {};
    sortDirection[key] = (sortDirection[key] === 1) ? -1 : 1;
    hienThi(document.getElementById("search").value);
}

function showToast(msg, color = "#1A472A") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.style.background = color;
    toast.style.display = "block";
    setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => { toast.style.display = "none"; toast.style.opacity = "1"; }, 300);
    }, 2500);
}

// ====================== KHỞI TẠO ======================
window.onload = () => {
    checkAdmin();
    hienThi();

    document.getElementById("mahang").addEventListener("input", e => e.target.value = e.target.value.toUpperCase());
    document.getElementById("search").addEventListener("input", timKiemRealTime);

    // Hiệu ứng vào trang cho card
    const card = document.getElementById("mainCard");
    card.style.opacity = "0";
    card.style.transform = "scale(0.94) translateY(40px)";
    setTimeout(() => {
        card.style.transition = "all 850ms cubic-bezier(0.25, 0.46, 0.45, 0.94)";
        card.style.opacity = "1";
        card.style.transform = "scale(1) translateY(0)";
    }, 50);
};
</script>

</body>
</html>
