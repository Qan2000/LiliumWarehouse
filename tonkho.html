<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tồn kho - Lilium Warehouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background: #f8f9f6;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1A472A, #2E6B3F);
            color: white;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            font-size: 21px;
            text-align: center;
            margin-bottom: 30px;
            color: #f0f4f1;
            letter-spacing: 1.5px;
        }
        .sidebar a {
            display: block;
            padding: 14px 18px;
            margin: 6px 0;
            color: #e0f0e4;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #4a9c6a;
            color: white;
            transform: translateX(8px);
            font-weight: 600;
        }
        .admin-only { display: none; }

        .content {
            flex: 1;
            padding: 60px 30px;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 40px 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 1150px;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(26, 71, 42, 0.15);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            text-decoration: none;
            cursor: pointer;
        }
        .back-link:hover { color: #1A472A; }

        h2.card-title {
            text-align: center;
            color: #1A472A;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px;
            background: #f4f9f6;
            padding: 28px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid #e0f0e4;
        }
        input {
            padding: 14px 16px;
            border: 1px solid #d1e0d7;
            border-radius: 12px;
            font-size: 15px;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #1A472A;
            box-shadow: 0 0 0 4px rgba(26, 71, 42, 0.15);
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
        }
        .add { background: linear-gradient(135deg, #1A472A, #2E6B3F); color: white; }
        .add:hover { background: linear-gradient(135deg, #2E6B3F, #1A472A); transform: translateY(-2px); }

        .reset { background: #64748b; color: white; }
        .reset:hover { background: #475569; }

        .export-excel { background: linear-gradient(135deg, #1A472A, #2E6B3F); color: white; }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .search-box input {
            width: 460px;
            padding: 14px 16px;
            border: 1px solid #d1e0d7;
            border-radius: 12px;
            font-size: 15px;
        }

        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(26, 71, 42, 0.1);
        }
        th, td { 
            padding: 16px 12px; 
            text-align: center;
            font-size: 15px;
        }
        th {
            background: linear-gradient(135deg, #1A472A, #2E6B3F);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        th:hover { background: #3a8a5a; }
        tr:nth-child(even) { background: #f8fbf9; }
        tr:hover { background: #f0f9f4; }

        /* Nút Sửa & Xóa đẹp */
        .action-btn {
            padding: 9px 16px;
            margin: 0 5px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .edit-btn { background: #2E6B3F; color: white; }
        .edit-btn:hover { background: #1A472A; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26,71,42,0.4); }

        .delete-btn { background: #ef4444; color: white; }
        .delete-btn:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239,68,68,0.4); }

        /* Reveal effect */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 800ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1A472A;
            color: white;
            padding: 15px 26px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(26, 71, 42, 0.35);
            display: none;
            z-index: 10000;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>LILIUM WAREHOUSE</h2>
    <a href="nhapkho.html" class="admin-only">📥 Nhập kho</a>
    <a href="xuatkho.html" class="admin-only">📤 Xuất kho</a>
    <a href="tonkho.html" class="active">📊 Tồn kho</a>
</div>

<div class="content">
    <div class="card" id="mainCard">
        <a href="index.html" class="back-link">⬅ Quay lại Trang chủ</a>
        <h2 class="card-title">📊 Quản lý tồn kho - Mỹ phẩm</h2>

        <form class="form-container reveal" onsubmit="themSanPham(); return false;">
            <input type="text" id="mahang" placeholder="Mã hàng *" maxlength="20" required>
            <input type="text" id="ten" placeholder="Tên sản phẩm *" required>
            <input type="text" id="nsx" placeholder="Nơi sản xuất">
            <input type="text" id="ncc" placeholder="Nhà cung cấp">
            <input type="text" id="qc" placeholder="Quy cách (ví dụ: 500g, 1.5kg, 250ml)">
            <input type="number" id="soluong" placeholder="Số lượng *" min="0" step="0.001" required>
            <input type="number" id="shelflife" placeholder="Shelf Life (tháng)" min="1">
            <input type="date" id="manufacture">
            <input type="date" id="retest">

            <button class="add" type="submit">➕ Lưu sản phẩm</button>
            <button class="reset" type="button" onclick="resetForm()">🔄 Làm mới</button>
        </form>

        <div class="search-box reveal">
            <input type="text" id="search" placeholder="🔍 Tìm kiếm mã hàng, tên sản phẩm...">
            <button class="export-excel" onclick="xuatExcel()">📊 Xuất Excel</button>
        </div>

        <div class="table-wrapper reveal">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th onclick="sortTable(1)">Mã hàng</th>
                        <th onclick="sortTable(2)">Tên sản phẩm</th>
                        <th onclick="sortTable(3)">Nhà cung cấp / Nơi SX</th>
                        <th>Quy cách</th>
                        <th onclick="sortTable(5)">Số lượng</th>
                        <th>Shelf Life</th>
                        <th>Manufacture Date</th>
                        <th>Retest Date</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="bang"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBHjg-9gjIStVv7QzYJXt9EkxwZO3KgJ3g",
  authDomain: "lilium-kho.firebaseapp.com",
  projectId: "lilium-kho"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= DATA =================
let products = {};
let stock = {};

// ================= LOAD PRODUCTS =================
onSnapshot(collection(db, "products"), (snapshot) => {
    products = {};
    snapshot.forEach(doc => {
        const d = doc.data();
        products[d.mahang] = d;
    });
    render();
});

// ================= LOAD TRANSACTIONS =================
onSnapshot(collection(db, "transactions"), (snapshot) => {
    stock = {};

    snapshot.forEach(doc => {
        const d = doc.data();

        if (!stock[d.mahang]) stock[d.mahang] = 0;

        if (d.type === "import") stock[d.mahang] += d.soluong;
        else stock[d.mahang] -= d.soluong;
    });

    render();
});

// ================= RENDER =================
function render() {
    const table = document.getElementById("bang");
    table.innerHTML = "";

    Object.keys(products).forEach(ma => {
        const p = products[ma];
        const sl = stock[ma] || 0;

        table.innerHTML += `
        <tr>
            <td>${ma}</td>
            <td>${p.ten}</td>
            <td>${p.ncc || ""}</td>
            <td>${p.nsx || ""}</td>
            <td>${p.qc || ""}</td>
            <td><b>${sl}</b></td>
        </tr>`;
    });
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", () => {
    const keyword = document.getElementById("search").value.toLowerCase();

    const table = document.getElementById("bang");
    table.innerHTML = "";

    Object.keys(products).forEach(ma => {
        const p = products[ma];
        const txt = (ma + p.ten).toLowerCase();

        if (!txt.includes(keyword)) return;

        const sl = stock[ma] || 0;

        table.innerHTML += `
        <tr>
            <td>${ma}</td>
            <td>${p.ten}</td>
            <td>${p.ncc || ""}</td>
            <td>${p.nsx || ""}</td>
            <td>${p.qc || ""}</td>
            <td><b>${sl}</b></td>
        </tr>`;
    });
});
</script>
</body>
</html>
