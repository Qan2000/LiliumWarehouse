<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tồn kho - Lilium Warehouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background: #f8f9f6;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1A472A, #2E6B3F);
            color: white;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            font-size: 21px;
            text-align: center;
            margin-bottom: 30px;
            color: #f0f4f1;
            letter-spacing: 1.5px;
        }
        .sidebar a {
            display: block;
            padding: 14px 18px;
            margin: 6px 0;
            color: #e0f0e4;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #4a9c6a;
            color: white;
            transform: translateX(8px);
            font-weight: 600;
        }

        .admin-only { display: none; }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 40px 35px;
            border-radius: 24px;
            width: 1120px;
            box-shadow: 0 20px 50px rgba(26, 71, 42, 0.15);
            will-change: transform, opacity;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .back-link:hover { color: #1A472A; }

        h2.card-title {
            text-align: center;
            color: #1A472A;
            margin-bottom: 25px;
            font-size: 26px;
        }

        /* ================== HIỆU ỨNG CHUYỂN CẢNH TỐI ƯU CHO CHROME ================== */
        .page-out {
            animation: pageOut 720ms cubic-bezier(0.42, 0.0, 0.58, 1.0) forwards !important;
        }
        @keyframes pageOut {
            to {
                opacity: 0;
                transform: scale(0.965) translateY(40px);
            }
        }

        .page-in {
            animation: pageIn 850ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes pageIn {
            from {
                opacity: 0;
                transform: scale(0.93) translateY(55px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            background: #f4f9f6;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #e0f0e4;
        }
        input {
            padding: 14px 16px;
            border: 1px solid #d1e0d7;
            border-radius: 12px;
            font-size: 15px;
            background: white;
            text-transform: uppercase;
        }
        input:focus {
            outline: none;
            border-color: #1A472A;
            box-shadow: 0 0 0 4px rgba(26, 71, 42, 0.15);
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
        }
        .add { background: linear-gradient(135deg, #1A472A, #2E6B3F); color: white; }
        .add:hover { background: linear-gradient(135deg, #2E6B3F, #1A472A); }
        .reset { background: #64748b; color: white; }
        .export-excel { background: linear-gradient(135deg, #1A472A, #2E6B3F); color: white; }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .search-box input {
            width: 420px;
            padding: 14px 16px;
            border: 1px solid #d1e0d7;
            border-radius: 12px;
        }

        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(26, 71, 42, 0.1);
        }
        th, td { padding: 14px 12px; text-align: center; }
        th {
            background: linear-gradient(135deg, #1A472A, #2E6B3F);
            color: white;
            cursor: pointer;
        }
        th:hover { background: #3a8a5a; }
        tr:nth-child(even) { background: #f8fbf9; }
        tr:hover { background: #f0f9f4; }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1A472A;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(26, 71, 42, 0.3);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>LILIUM WAREHOUSE</h2>
    <a href="nhapkho.html" class="admin-only">📥 Nhập kho</a>
    <a href="xuatkho.html" class="admin-only">📤 Xuất kho</a>
    <a href="tonkho.html" class="active">📊 Tồn kho</a>
</div>

<div class="content">
    <div class="card" id="mainCard">
        <a href="index.html" class="back-link" id="backToHome">⬅ Quay lại Trang chủ</a>
        <h2 class="card-title">📊 Quản lý tồn kho - Mỹ phẩm</h2>

        <form class="form-container" onsubmit="themSanPham(); return false;">
            <input type="text" id="mahang" placeholder="Mã hàng *" maxlength="20" required>
            <input type="text" id="ten" placeholder="Tên sản phẩm *" required>
            <input type="text" id="nsx" placeholder="Nơi sản xuất">
            <input type="text" id="ncc" placeholder="Nhà cung cấp">
            <input type="text" id="qc" placeholder="Quy cách (ví dụ: 500g, 1.5kg, 250ml)" style="min-width: 220px;">
            <input type="number" id="soluong" placeholder="Số lượng *" min="0" step="0.01" required>
            <input type="number" id="shelflife" placeholder="Shelf Life (tháng)" min="1">
            <input type="date" id="manufacture" placeholder="Ngày sản xuất">
            <input type="date" id="retest" placeholder="Retest Date">

            <button class="add" type="submit">➕ Lưu sản phẩm</button>
            <button class="reset" type="button" onclick="resetForm()">🔄 Làm mới</button>
        </form>

        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Tìm kiếm mã hàng, tên sản phẩm...">
            <button class="export-excel" onclick="xuatExcel()">📊 Xuất Excel</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th onclick="sortTable(1)">Mã hàng</th>
                        <th onclick="sortTable(2)">Tên sản phẩm ▼</th>
                        <th onclick="sortTable(3)">Nhà cung cấp / Nơi SX</th>
                        <th>Quy cách</th>
                        <th onclick="sortTable(5)">Số lượng</th>
                        <th>Shelf Life</th>
                        <th>Manufacture Date</th>
                        <th>Retest Date</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="bang"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>

let danhSach = JSON.parse(localStorage.getItem("mypham")) || [];
let editIndex = -1;
let sortDirection = 1;

function checkAdmin() {
    const isAdmin = sessionStorage.getItem("isLoggedIn") === "true";
    document.querySelectorAll('.admin-only').forEach(link => {
        link.style.display = isAdmin ? "block" : "none";
    });
}

function luuLocal() { localStorage.setItem("mypham", JSON.stringify(danhSach)); }

function hienThi(filter = "") {
    let bang = document.getElementById("bang");
    bang.innerHTML = "";

    danhSach.forEach((sp, index) => {
        let text = (sp.mahang + " " + sp.ten + " " + (sp.nsx || "") + " " + (sp.ncc || "")).toLowerCase();
        if (!text.includes(filter.toLowerCase())) return;

        let nccNsx = '';
        if (sp.ncc && sp.nsx) nccNsx = `${sp.ncc} - ${sp.nsx}`;
        else if (sp.ncc) nccNsx = sp.ncc;
        else if (sp.nsx) nccNsx = sp.nsx;
        else nccNsx = '-';

        bang.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td><strong>${sp.mahang}</strong></td>
                <td><strong>${sp.ten}</strong></td>
                <td>${nccNsx}</td>
                <td>${sp.qc || '-'}</td>
                <td><strong>${sp.soluong}</strong></td>
                <td>${sp.shelflife ? sp.shelflife + ' tháng' : '-'}</td>
                <td>${sp.manufacture ? sp.manufacture : '-'}</td>
                <td>${sp.retest ? sp.retest : '-'}</td>
                <td>
                    <button onclick="suaSanPham(${index})" style="background:#2E6B3F;color:white;margin-right:5px;padding:6px 12px;border:none;border-radius:8px;cursor:pointer;">Sửa</button>
                    <button onclick="xoaSanPham(${index})" style="background:#ef4444;color:white;padding:6px 12px;border:none;border-radius:8px;cursor:pointer;">Xóa</button>
                </td>
            </tr>`;
    });
}


function themSanPham() { /* copy nguyên hàm cũ của bạn */ }
function xoaSanPham(i) { /* copy nguyên */ }
function suaSanPham(i) { /* copy nguyên */ }
function resetForm() { /* copy nguyên */ }
function timKiemRealTime() { hienThi(document.getElementById("search").value); }
function xuatExcel() { /* copy nguyên hàm cũ */ }
function sortTable(col) { /* copy nguyên */ }
function showToast(msg, color = "#1A472A") { /* copy nguyên */ }

// ====================== CHUYỂN CẢNH MƯỢT MÀ CHO NÚT QUAY LẠI ======================
function navigateTo(url) {
    const card = document.getElementById("mainCard");
    
    card.style.transition = "all 720ms cubic-bezier(0.42, 0.0, 0.58, 1.0)";
    card.style.opacity = "0";
    card.style.transform = "scale(0.965) translateY(40px)";

    setTimeout(() => {
        window.location.href = url;
    }, 720);
}

// Áp dụng cho tất cả link + nút quay lại
document.querySelectorAll('.sidebar a, .back-link').forEach(link => {
    link.addEventListener('click', function(e) {
        if (this.getAttribute('href') && this.getAttribute('href') !== window.location.pathname.split("/").pop()) {
            e.preventDefault();
            navigateTo(this.getAttribute('href'));
        }
    });
});

// ====================== KHỞI TẠO ======================
window.onload = () => {
    checkAdmin();
    hienThi();

    // Tự động in hoa
    document.getElementById("mahang").addEventListener("input", e => e.target.value = e.target.value.toUpperCase());
    document.getElementById("ten").addEventListener("input", e => e.target.value = e.target.value.toUpperCase());

    document.getElementById("search").addEventListener("input", timKiemRealTime);

    // Hiệu ứng vào trang
    const card = document.getElementById("mainCard");
    card.style.opacity = "0";
    card.style.transform = "scale(0.93) translateY(55px)";

    setTimeout(() => {
        card.style.transition = "all 850ms cubic-bezier(0.25, 0.46, 0.45, 0.94)";
        card.style.opacity = "1";
        card.style.transform = "scale(1) translateY(0)";
    }, 30);
};
</script>

</body>
</html>
